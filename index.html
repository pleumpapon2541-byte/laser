<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Laser Trainer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      background: #0b0b0b;
      color: white;
      font-family: sans-serif;
      text-align: center;
    }
    video, canvas {
      width: 100%;
      max-width: 400px;
      border-radius: 12px;
    }
    .hud {
      display: flex;
      justify-content: space-around;
      margin: 10px;
    }
    button {
      padding: 10px 15px;
      border: none;
      border-radius: 10px;
      background: #222;
      color: white;
      margin: 5px;
      cursor: pointer;
    }
    .hit {
      position: absolute;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: red;
      pointer-events: none;
      transform: translate(-50%, -50%);
      opacity: 0.8;
    }
  </style>
</head>
<body>

<h1>🎯 Laser Trainer</h1>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<div class="hud">
  <div>Score: <span id="score">0</span></div>
  <div>Shots: <span id="shots">0</span></div>
</div>

<div>
  <button onclick="startCamera()">Start Camera</button>
  <button onclick="reset()">Reset</button>
</div>

<script>
let video = document.getElementById("video");
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

let score = 0;
let shots = 0;

async function startCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment" }
  });
  video.srcObject = stream;

  video.onloadedmetadata = () => {
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    detect();
  };
}

function detect() {
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
  let frame = ctx.getImageData(0, 0, canvas.width, canvas.height);
  let data = frame.data;

  let maxR = 0;
  let hitX = 0;
  let hitY = 0;

  for (let i = 0; i < data.length; i += 4) {
    let r = data[i];
    let g = data[i + 1];
    let b = data[i + 2];

    // ตรวจจับ "laser สีแดง"
    if (r > 200 && g < 80 && b < 80) {
      if (r > maxR) {
        maxR = r;
        let index = i / 4;
        hitX = index % canvas.width;
        hitY = Math.floor(index / canvas.width);
      }
    }
  }

  if (maxR > 200) {
    registerHit(hitX, hitY);
  }

  requestAnimationFrame(detect);
}

function registerHit(x, y) {
  shots++;

  // scoring zone ง่ายๆ
  let centerX = canvas.width / 2;
  let centerY = canvas.height / 2;
  let dist = Math.hypot(x - centerX, y - centerY);

  let pts = 5;
  if (dist < 50) pts = 10;
  else if (dist < 120) pts = 8;

  score += pts;

  document.getElementById("score").innerText = score;
  document.getElementById("shots").innerText = shots;

  showHit(x, y);
}

function showHit(x, y) {
  let dot = document.createElement("div");
  dot.className = "hit";
  dot.style.left = x + "px";
  dot.style.top = y + "px";

  document.body.appendChild(dot);
  setTimeout(() => dot.remove(), 300);
}

function reset() {
  score = 0;
  shots = 0;
  document.getElementById("score").innerText = 0;
  document.getElementById("shots").innerText = 0;
}
</script>

</body>
</html>
