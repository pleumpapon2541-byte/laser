<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Laser Trainer PRO+</title>
<script async src="https://docs.opencv.org/4.x/opencv.js"></script>
<style>
body { margin:0; background:black; color:white; font-family:sans-serif; text-align:center;}
video, canvas { position:absolute; top:0; left:0; }
#ui { position:fixed; bottom:10px; left:0; right:0; }
button { padding:8px 14px; margin:3px; }
</style>
</head>
<body>

<video id="video" autoplay playsinline></video> <canvas id="canvas"></canvas>

<div id="ui">
  <div>Score: <span id="score">0</span> | Shots: <span id="shots">0</span></div>
  <button onclick="start()">Start</button>
  <button onclick="reset()">Reset</button>
</div>

<script>
let video = document.getElementById("video");
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

let score=0, shots=0;
let lastShot=0;

function updateUI(){
 document.getElementById("score").innerText=score;
 document.getElementById("shots").innerText=shots;
}

async function start(){
 const stream = await navigator.mediaDevices.getUserMedia({
  video: { facingMode: "environment" }
 });
 video.srcObject=stream;

 video.onloadedmetadata=()=>{
  canvas.width=video.videoWidth;
  canvas.height=video.videoHeight;
  detect();
 }
}

function reset(){ score=0; shots=0; updateUI(); }

// 🔥 เพิ่ม Gamma + Brightness
function enhanceImage(src){
 cv.convertScaleAbs(src, src, 1.5, 40);

 let lut = new cv.Mat(1, 256, cv.CV_8U);
 for (let i = 0; i < 256; i++) {
  lut.data[i] = Math.pow(i / 255.0, 0.5) * 255;
 }
 cv.LUT(src, lut, src);
 lut.delete();
}

function detect(){
 ctx.drawImage(video,0,0);

 let src = cv.imread(canvas);

 // 🔥 ปรับภาพให้สว่างขึ้น
 enhanceImage(src);

 let hsv = new cv.Mat();
 cv.cvtColor(src,hsv,cv.COLOR_RGBA2RGB);
 cv.cvtColor(hsv,hsv,cv.COLOR_RGB2HSV);

 // 🔥 detect แดงกว้างขึ้น
 let low1 = new cv.Mat(hsv.rows,hsv.cols,hsv.type(),[0,100,100,0]);
 let high1 = new cv.Mat(hsv.rows,hsv.cols,hsv.type(),[10,255,255,255]);

 let low2 = new cv.Mat(hsv.rows,hsv.cols,hsv.type(),[160,100,100,0]);
 let high2 = new cv.Mat(hsv.rows,hsv.cols,hsv.type(),[180,255,255,255]);

 let mask1 = new cv.Mat();
 let mask2 = new cv.Mat();
 let mask = new cv.Mat();

 cv.inRange(hsv,low1,high1,mask1);
 cv.inRange(hsv,low2,high2,mask2);
 cv.add(mask1, mask2, mask);

 // 🔥 ลด noise
 let kernel = cv.Mat.ones(3,3,cv.CV_8U);
 cv.morphologyEx(mask, mask, cv.MORPH_OPEN, kernel);
 cv.morphologyEx(mask, mask, cv.MORPH_DILATE, kernel);

 let contours = new cv.MatVector();
 let hierarchy = new cv.Mat();
 cv.findContours(mask,contours,hierarchy,cv.RETR_EXTERNAL,cv.CHAIN_APPROX_SIMPLE);

 let maxArea=0, hit=null;

 for(let i=0;i<contours.size();i++){
  let cnt = contours.get(i);
  let area = cv.contourArea(cnt);

  if(area>maxArea && area < 500){ // 🔥 กันแสงหลอก
   let rect = cv.boundingRect(cnt);
   hit=[rect.x+rect.width/2, rect.y+rect.height/2];
   maxArea=area;
  }
 }

 let now=Date.now();

 if(hit && now-lastShot>250){
  shots++;
  score+=10;
  lastShot=now;

  ctx.beginPath();
  ctx.arc(hit[0],hit[1],12,0,2*Math.PI);
  ctx.strokeStyle="red";
  ctx.lineWidth=3;
  ctx.stroke();

  updateUI();
 }

 src.delete(); hsv.delete(); mask.delete();
 mask1.delete(); mask2.delete();
 contours.delete(); hierarchy.delete();
 low1.delete(); high1.delete();
 low2.delete(); high2.delete();

 requestAnimationFrame(detect);
}
</script>

</body>
</html>
